<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kesinti Var! | Sistem Durumu</title>
    <style>
        body {
            background-color: #000000;
            color: #ff3d00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        /* Çıldıran Sayaç */
        .glitch-timer {
            font-size: 4.5rem;
            font-weight: bold;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(255, 61, 0, 0.6);
            margin-bottom: 20px;
            user-select: none;
        }

        .status-text {
            font-size: 1.1rem;
            color: #555555;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Arka planda siber hata havası katacak ufak bir efekt */
        .matrix-noise {
            position: absolute;
            font-size: 0.7rem;
            color: rgba(255, 61, 0, 0.03);
            white-space: nowrap;
            user-select: none;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="glitch-timer" id="crazyTimer">00:00:00</div>
        <div class="status-text" id="statusMessage">Büyük Sunucu Maliyetleri Yüzünden Kapatılıyor...</div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            delirenSayac();
            arkaPlanGürültüsü();
        });

        function delirenSayac() {
            const timerElement = document.getElementById('crazyTimer');
            const messageElement = document.getElementById('statusMessage');
            
            // Alt metinleri de arada bir bozmak için varyasyonlar
            const mesajlar = [
                "Büyük Sunucu Maliyetleri Yüzünden Kapatılıyor...",
                "SİSTEM_HATASI: BAĞLANTI_KESİLDİ",
                "VERİ_TABANI_ÇÖKTÜ_BAĞLANTI_ARANIYOR",
                "KAPATILIYOR...",
                "ERROR_408_TIMEOUT_GLITCH"
            ];

            setInterval(() => {
                // 🎲 Tamamen rastgele saat, dakika ve saniye üretiliyor
                let rSaat = String(Math.floor(Math.between ?? Math.random() * 99)).padStart(2, '0');
                let rDakika = String(Math.floor(Math.random() * 60)).padStart(2, '0');
                let rSaniye = String(Math.floor(Math.random() * 60)).padStart(2, '0');
                
                // Arada sırada hile yapıp milisaniye benzeri 3 haneli sayılar fırlatsın
                if(Math.random() > 0.85) {
                    rSaat = String(Math.floor(Math.random() * 999)).padStart(3, '0');
                }

                // Sayacı ekrana bas
                timerElement.textContent = `${rSaat}:${rDakika}:${rSaniye}`;

                // Arada bir aşağıdaki yazıyı da rastgele boz ki iyice çöktü sansınlar
                if(Math.random() > 0.90) {
                    const rastgeleMesaj = mesajlar[Math.floor(Math.random() * mesajlar.length)];
                    messageElement.textContent = rastgeleMesaj;
                }
            }, 150); // 150 milisaniy
