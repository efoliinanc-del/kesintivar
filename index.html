<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kesinti Var!</title>
    <style>
        /* 🎨 Premium Deep Black Teması */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 550px;
            width: 100%;
            padding: 40px 20px;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 16px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.8);
        }

        h1 {
            font-size: 2.2rem;
            color: #ff3d00;
            letter-spacing: 2px;
            margin-bottom: 25px;
            font-weight: 900;
            text-shadow: 0 0 15px rgba(255, 61, 0, 0.3);
        }

        /* ⏳ Sayaç Kutusu */
        .countdown {
            font-size: 3.5rem;
            font-weight: bold;
            font-family: monospace;
            background: #111111;
            padding: 20px;
            border-radius: 12px;
            border: 1px dashed #222;
            margin-bottom: 30px;
            letter-spacing: 1px;
            display: inline-block;
            min-width: 290px;
        }

        /* 📢 Durum Yazısı */
        .status-text {
            font-size: 1rem;
            color: #888888;
            font-weight: bold;
            line-height: 1.5;
            letter-spacing: 0.5px;
        }

        /* 🔒 Telif Hakkı Alanı */
        footer {
            margin-top: 40px;
            text-align: center;
        }

        footer p {
            font-size: 0.75rem;
            color: #444444;
            letter-spacing: 1px;
            font-family: 'Courier New', Courier, monospace;
        }

        /* Mobil Cihazlar İçin Uyum (Responsive Fix) */
        @media (max-width: 480px) {
            .countdown {
                font-size: 2.5rem;
                min-width: 220px;
                padding: 15px;
            }
            h1 {
                font-size: 1.8rem;
            }
            .status-text {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>KESİNTİ VAR</h1>
        
        <div class="countdown" id="timer">00:00:00</div>
        
        <div class="status-text" id="statusMessage">
            Büyük Sunucu Maliyetleri Yüzünden Kapatılıyor.
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Efe Studios. Tüm hakları saklıdır. Telif hakları sonsuza dek burada kalacak.</p>
    </footer>

    <script>
        // Hedef Zaman: 1 Temmuz 2026 Saat 00:00:00
        const hedefTarih = new Date("July 1, 2026 00:00:00").getTime();

        const timerElement = document.getElementById("timer");
        const statusElement = document.getElementById("statusMessage");

        function sayaciGuncelle() {
            const simdi = new Date().getTime();
            const kalanSure = hedefTarih - simdi;

            // Zaman hesaplamaları (Gün, Saat, Dakika, Saniye)
            const gun = Math.floor(kalanSure / (1000 * 60 * 60 * 24));
            const saat = Math.floor((kalanSure % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const dakika = Math.floor((kalanSure % (1000 * 60 * 60)) / (1000 * 60));
            const saniye = Math.floor((kalanSure % (1000 * 60)) / 1000);

            // Süre henüz bitmediyse
            if (kalanSure > 0) {
                // Eğer 1 günden fazla varsa Gün bilgisini de ekle, yoksa sadece Saat:Dakika:Saniye göster
                let formatliZaman = "";
                if (gun > 0) {
                    formatliZaman += gun + "g ";
                }
                
                formatliZaman += 
                    saat.toString().padStart(2, '0') + ":" + 
                    dakika.toString().padStart(2, '0') + ":" + 
                    saniye.toString().padStart(2, '0');

                timerElement.innerText = formatliZaman;
                statusElement.innerText = "Büyük Sunucu Maliyetleri Yüzünden Kapatılıyor.";
                statusElement.style.color = "#888888";
            } 
            // Süre bittiyse (1 Temmuz 00:00 ve sonrası)
            else {
                timerElement.innerText = "00:00:00";
                statusElement.innerText = "Büyük Sunucu Maliyeti Yüzünden Kapatıldı.";
                statusElement.style.color = "#ff3d00"; // Dikkat çekmesi için kırmızı tonu
                clearInterval(zamanlayiciDongusu); // Süre bittiği için döngüyü durdur
            }
        }

        // Sayacı her saniye başı (1000 ms) çalıştır
        const zamanlayiciDongusu = setInterval(sayaciGuncelle, 1000);

        // Sayfa ilk yüklendiğinde 1 saniye boş kalmasın diye hemen tetikle
        sayaciGuncelle();
    </script>
</body>
</html>
