<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kesinti Var! | Canlı Takip Merkezi</title>
    
    <style>
        /* 🎨 Premium Deep Black Teması */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #000000; 
            color: #e0e0e0;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .main-wrapper {
            width: 100%;
            max-width: 650px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex-grow: 1;
        }

        .header-panel {
            text-align: center;
            padding: 25px 20px;
            background: #0a0a0a;
            border-radius: 16px;
            border: 1px solid #1a1a1a;
            box-shadow: 0 4px 25px rgba(0,0,0,0.8);
        }

        .header-panel h1 {
            font-size: 1.9rem;
            color: #ff3d00;
            letter-spacing: 2px;
            margin-bottom: 6px;
            font-weight: 900;
            text-shadow: 0 0 15px rgba(255, 61, 0, 0.4);
        }

        .header-panel p {
            font-size: 0.85rem;
            color: #777777;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .filter-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 5px 2px 10px 2px;
            scrollbar-width: none;
        }
        
        .filter-container::-webkit-scrollbar {
            display: none;
        }

        .filter-btn {
            background: #0a0a0a;
            color: #888888;
            border: 1px solid #1a1a1a;
            padding: 9px 18px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .filter-btn.active, .filter-btn:hover {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.2);
        }

        .kesinti-listesi {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .kesinti-kart {
            background: #0a0a0a;
            border: 1px solid #161616;
            border-radius: 14px;
            padding: 18px;
            transition: border-color 0.2s ease;
        }

        .kesinti-kart.elektrik { 
            border-left: 4px solid #ffea00; 
        }
        .kesinti-kart.su { 
            border-left: 4px solid #00b0ff; 
        }

        .kart-ust {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .konum-box {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .sehir-etiket {
            background: #ff3d00;
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .ilce-etiket {
            background: #1a1a1a;
            color: #cccccc;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .kurum-etiket {
            font-size: 0.65rem;
            color: #666666;
            font-weight: bold;
            background: #111111;
            padding: 3px 6px;
            border-radius: 4px;
            border: 1px solid #222222;
        }

        .kesinti-detay h3 {
            font-size: 1.05rem;
            margin-bottom: 5px;
            color: #ffffff;
            font-weight: 600;
        }

        .kesinti-detay p {
            font-size: 0.85rem;
            color: #999999;
            line-height: 1.45;
        }

        .zaman-bilgisi {
            margin-top: 12px;
            font-size: 0.75rem;
            color: #555555;
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #161616;
            padding-top: 10px;
        }

        footer {
            width: 100%;
            max-width: 650px;
            text-align: center;
            padding: 25px 10px;
            margin-top: 30px;
            border-top: 1px solid #111111;
        }

        footer p {
            font-size: 0.75rem;
            color: #444444;
            letter-spacing: 1px;
            font-family: 'Courier New', Courier, monospace;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="header-panel">
            <h1>KESİNTİ VAR!</h1>
            <p>⚡ Canlı Altyapı Arıza & Kesinti Takip Merkezi</p>
        </div>

        <div class="filter-container">
            <button class="filter-btn active">Tüm Şehirler</button>
            <button class="filter-btn">İstanbul</button>
            <button class="filter-btn">Çanakkale</button>
            <button class="filter-btn">Bursa</button>
            <button class="filter-btn">Balıkesir</button>
            <button class="filter-btn">Yalova</button>
        </div>

        <div class="kesinti-listesi" id="kesintiHavuzu"></div>
    </div>

    <footer>
        <p>&copy; 2026 Efe Studios. Tüm hakları saklıdır. Telif hakları sonsuza dek burada kalacak.</p>
    </footer>

    <!-- ⚙️ VERİ BAĞLANTI, VERİ ÇEKME VE FİLTRELEME MOTORU -->
    <script>
        const PROXY = "https://api.allorigins.win/raw?url=";
        const API_URLS = {
            uedas: "https://ogm.uedas.com.tr/api/v1/kesintiler/aktif", 
            bedas: "https://api.bedas.com.tr/v1/kesintiler/current",
            iski: "https://api.iski.gov.tr/v2/kesintiler/aktif"
        };

        document.addEventListener("DOMContentLoaded", () => {
            setupFilters();
            canliVerileriGetir();
        });

        function setupFilters() {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelector('.filter-btn.active').classList.remove('active');
                    btn.classList.add('active');
                    const secilenSehir = btn.textContent.trim();
                    filtrele(secilenSehir);
                });
            });
        }

        // 🔍 Ekrandaki Kartları Şehre Göre Süzme Fonksiyonu
        function filtrele(sehir) {
            const kartlar = document.querySelectorAll('.kesinti-kart');
            let counter = 0;
            
            // 🔥 BUG FIX: Sayfada biriken ne kadar eski "bosUyari" varsa hepsini döngüyle temizler!
            const eskiUyarilar = document.querySelectorAll('#bosUyari');
            eskiUyarilar.forEach(uyari => uyari.remove());

            kartlar.forEach(kart => {
                const kartSehri = kart.querySelector('.sehir-etiket').textContent.trim();
                if (sehir === "Tüm Şehirler" || kartSehri === sehir) {
                    kart.style.display = "block";
                    counter++;
                } else {
                    kart.style.display = "none";
                }
            });

            const havuz = document.getElementById('kesintiHavuzu');
            if (counter === 0) {
                havuz.insertAdjacentHTML('beforeend', `
                    <div id='bosUyari' style='text-align:center; padding:35px 20px; color:#00e676; font-weight:bold; background:#0a0a0a; border-radius:14px; border:1px dashed #111;'>
                        🟢 ${sehir} genelinde şu an planlı bir kesinti bulunmuyor!
                    </div>
                `);
            }
        }

        async function canliVerileriGetir() {
            const havuz = document.getElementById('kesintiHavuzu');
            havuz.innerHTML = "<div style='text-align:center; padding:20px; color:#555;'>🔄 Canlı kurum verileri yükleniyor...</div>";

            try {
                havuz.innerHTML = ""; 

                try {
                    const uedasRes = await fetch(PROXY + encodeURIComponent(API_URLS.uedas));
                    const uedasData = await uedasRes.json();
                    
                    if (Array.isArray(uedasData)) {
                        uedasData.forEach(item => {
                            const sehirAdi = ilkHarfiBuyut(item.ilAdi || item.sehir); 
                            const ilceAdi = ilkHarfiBuyut(item.ilceAdi || item.ilce);
                            
                            kartOlustur(
                                sehirAdi,
                                ilceAdi,
                                "⚡ UEDAŞ",
                                "elektrik",
                                item.kesintiNedeni || "Şebeke Çalışması",
                                item.etkilenenBölgeler || item.acıklama || "Bölgede altyapı çalışması yapılmaktadır.",
                                item.sure || "Belirtilmedi",
                                item.baslangicSaati || "--:--"
                            );
                        });
                    }
                } catch(e) { console.error("UEDAŞ API hatası:", e); }

                try {
                    const bedasRes = await fetch(PROXY + encodeURIComponent(API_URLS.bedas));
                    const bedasData = await bedasRes.json();
                    
                    if (Array.isArray(bedasData)) {
                        bedasData.forEach(item => {
                            kartOlustur("İstanbul", item.ilce, "🔌 BEDAŞ", "elektrik", "Planlı Kesinti", item.semtler, item.sure + " Saat", item.saat);
                        });
                    }
                } catch(e) { console.error("BEDAŞ API hatası:", e); }

                try {
                    const iskiRes = await fetch(PROXY + encodeURIComponent(API_URLS.iski));
                    const iskiData = await iskiRes.json();
                    
                    if (Array.isArray(iskiData)) {
                        iskiData.forEach(item => {
                            kartOlustur("İstanbul", item.ilce, "💧 İSKİ", "su", item.sebep || "Arıza Onarım", item.mahalleler, "Çalışma Sürüyor", item.saat);
                        });
                    }
                } catch(e) { console.error("İSKİ API hatası:", e); }

                if (havuz.innerHTML === "") {
                    havuz.innerHTML = `
                        <div id='bosUyari' style='text-align:center; padding:35px 20px; color:#00e676; font-weight:bold; background:#0a0a0a; border-radius:14px; border:1px dashed #111;'>
                            🟢 Tüm şehirler temiz! Şu an aktif hiçbir kesinti bulunamadı.
                        </div>
                    `;
                }

            } catch (error) {
                havuz.innerHTML = "<div style='text-align:center; color:#ff5252; padding:20px;'>❌ Canlı veriler alınırken bir sorun oluştu.</div>";
                console.error("Genel Veri Çekme Hatası:", error);
            }
        }

        function kartOlustur(sehir, ilce, kurum, tur, baslik, detay, sure, saat) {
            const havuz = document.getElementById('kesintiHavuzu');
            
            const kartHtml = `
                <div class="kesinti-kart ${tur}">
                    <div class="kart-ust">
                        <div class="konum-box">
                            <span class="sehir-etiket">${sehir}</span>
                            <span class="ilce-etiket">${ilce}</span>
                        </div>
                        <span class="kurum-etiket">${kurum}</span>
                    </div>
                    <div class="kesinti-detay">
                        <h3>${baslik}</h3>
                        <p>${detay}</p>
                    </div>
                    <div class="zaman-bilgisi">
                        <span>⏳ Süre: ${sure}</span>
                        <span>🕒 Başlangıç: ${saat}</span>
                    </div>
                </div>
            `;
            havuz.insertAdjacentHTML('beforeend', kartHtml);
        }

        function ilkHarfiBuyut(str) {
            if(!str) return "Bilinmiyor";
            return str.charAt(0).toUpperCase() + str.slice(1).toLowerCase();
        }
    </script>
</body>
</html>
